name:                village
version:             0.1.0.0
github:              "githubuser/village"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/village#readme>

language: GHC2021
dependencies:
- base >= 4.7 && < 5


default-extensions:
- AllowAmbiguousTypes
- ApplicativeDo
- BlockArguments
- DataKinds
- DeriveAnyClass
- DerivingStrategies
- DerivingVia
- DuplicateRecordFields
- FunctionalDependencies
- GADTs
- ImportQualifiedPost
- LambdaCase
- NamedFieldPuns
- NoFieldSelectors
- NoStarIsType
- OverloadedRecordDot
- OverloadedLabels
- OverloadedStrings
- PackageImports
- PatternSynonyms
- QuasiQuotes
- RecordWildCards
- StrictData
- TemplateHaskell
- TypeApplications
- TypeFamilies

ghc-options:
- -Wall
- -Wmissing-export-lists
- -Wmissing-deriving-strategies
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
- -Wno-unused-top-binds

library:
  source-dirs: src

executables:
  village-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - village

tests:
  village-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - village
