services:

  db:
    image: postgres:16
    container_name: village_database
    environment:
      # At initial container startup, the offical postgres image will look for these environment varuables to create a new database (POSTGRES_DB) and a new superuser (POSTGRES_USER) with the specified password (POSTGRES_PASSWORD). So long as the associated volume isn't deleted, these values/configuration will persist across container restarts. If we didn't supply these environment variables, then the postgres image would use default values such as POSTGRES_USER=postgres, POSTGRES_PASSWORD=postgres, and POSTGRES_DB=postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # We are saying the docker volume "postgres-data" should be mounted at the path "/var/lib/postgresql/data" in the container. This is where our postgres data will be stored. By using a volume, we ensure that our data persists across container restarts and removals. Something to note, the path "/var/lib/postgresql/data" is the default data directory for PostgreSQL in the official Docker image.
      - postgres_data:/var/lib/postgresql/data

  # This way we can have a separate db for automated testing that won't be affected by any of the manual stuff we do with the main db. We can also run them at the same time if we want to, which is nice.
  test_db:
    image: postgres:16
    container_name: village_test_database
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TEST_POSTGRES_DB}
    ports:
      - "${TEST_POSTGRES_PORT}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data: # Here we are declaring the volume for our postgres (the main_db) service. It looks empty but all we're doing is registering the volume name. Docker handles the rest from there
  postgres_test_data: # Here we are declaring the volume for our postgres (the test_db) service. It looks empty but all we're doing is registering the volume name. Docker handles the rest from there
